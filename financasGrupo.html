<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Finanças Familiar</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #0f172a;
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
        }

        .card-hover:hover {
            transform: translateY(-2px);
            transition: .2s;
        }
    </style>
</head>
<body class="min-h-screen text-white">

    <div class="max-w-7xl mx-auto p-6">

        <div class="mb-8">
            <h1 class="text-4xl font-black">
                💰 Finanças Familiar
            </h1>

            <p class="text-slate-400 mt-2">
                Controle de contas compartilhadas e gastos individuais.
            </p>
        </div>

        <!-- FORM -->
        <div class="grid lg:grid-cols-2 gap-6">

            <!-- PESSOA -->
            <div class="glass rounded-3xl p-6 border border-slate-700">

                <h2 class="text-2xl font-bold mb-5">
                    Adicionar Pessoa
                </h2>

                <div class="space-y-4">

                    <div>
                        <label class="text-sm text-slate-400">
                            Nome
                        </label>

                        <input
                            id="nomePessoa"
                            type="text"
                            class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-cyan-500"
                            placeholder="Ex: João"
                        />
                    </div>

                    <div>
                        <label class="text-sm text-slate-400">
                            Salário Mensal
                        </label>

                        <input
                            id="salarioPessoa"
                            type="number"
                            class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-cyan-500"
                            placeholder="2500"
                        />
                    </div>

                    <button
                        onclick="adicionarPessoa()"
                        class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-bold py-3 rounded-xl"
                    >
                        Adicionar Pessoa
                    </button>

                </div>
            </div>

            <!-- CONTA -->
            <div class="glass rounded-3xl p-6 border border-slate-700">

                <h2 class="text-2xl font-bold mb-5">
                    Adicionar Conta
                </h2>

                <div class="space-y-4">

                    <div>
                        <label class="text-sm text-slate-400">
                            Nome da Conta
                        </label>

                        <input
                            id="nomeConta"
                            type="text"
                            class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500"
                            placeholder="Ex: Internet"
                        />
                    </div>

                    <div>
                        <label class="text-sm text-slate-400">
                            Valor
                        </label>

                        <input
                            id="valorConta"
                            type="number"
                            class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-emerald-500"
                            placeholder="150"
                        />
                    </div>

                    <div>
                        <label class="text-sm text-slate-400">
                            Tipo
                        </label>

                        <select
                            id="tipoConta"
                            class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none"
                        >
                            <option value="compartilhada">
                                Compartilhada
                            </option>

                            <option value="individual">
                                Individual
                            </option>
                        </select>
                    </div>

                    <div id="selectPessoaContainer" class="hidden">
                        <label class="text-sm text-slate-400">
                            Pessoa
                        </label>

                        <select
                            id="pessoaConta"
                            class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none"
                        ></select>
                    </div>

                    <button
                        onclick="adicionarConta()"
                        class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 rounded-xl"
                    >
                        Adicionar Conta
                    </button>

                </div>
            </div>
        </div>

        <!-- RESUMO -->
        <div class="mt-8 grid lg:grid-cols-3 gap-6">

            <div class="glass rounded-3xl p-6 border border-slate-700">
                <h3 class="text-slate-400 text-sm">
                    Total Contas Compartilhadas
                </h3>

                <p id="totalCompartilhado"
                   class="text-3xl font-black mt-2">
                    R$ 0
                </p>
            </div>

            <div class="glass rounded-3xl p-6 border border-slate-700">
                <h3 class="text-slate-400 text-sm">
                    Pessoas na Casa
                </h3>

                <p id="totalPessoas"
                   class="text-3xl font-black mt-2">
                    0
                </p>
            </div>

            <div class="glass rounded-3xl p-6 border border-slate-700">
                <h3 class="text-slate-400 text-sm">
                    Divisão por Pessoa
                </h3>

                <p id="valorDividido"
                   class="text-3xl font-black mt-2">
                    R$ 0
                </p>
            </div>

        </div>

        <!-- PESSOAS -->
        <div class="mt-8">

            <h2 class="text-3xl font-black mb-6">
                👨‍👩‍👧‍👦 Pessoas
            </h2>

            <div
                id="listaPessoas"
                class="grid lg:grid-cols-2 gap-6"
            ></div>
        </div>

    </div>

    <script>

        let pessoas = JSON.parse(localStorage.getItem("pessoas")) || [];
        let contas = JSON.parse(localStorage.getItem("contas")) || [];

        const tipoConta = document.getElementById("tipoConta");

        tipoConta.addEventListener("change", () => {

            const container = document.getElementById("selectPessoaContainer");

            if (tipoConta.value === "individual") {
                container.classList.remove("hidden");
            }
            else {
                container.classList.add("hidden");
            }
        });

        function salvar() {
            localStorage.setItem("pessoas", JSON.stringify(pessoas));
            localStorage.setItem("contas", JSON.stringify(contas));
        }

        function formatar(valor) {
            return valor.toLocaleString("pt-BR", {
                style: "currency",
                currency: "BRL"
            });
        }

        function adicionarPessoa() {

            const nome = document.getElementById("nomePessoa").value;
            const salario = Number(document.getElementById("salarioPessoa").value);

            if (!nome || !salario) {
                alert("Preencha os campos.");
                return;
            }

            pessoas.push({
                id: Date.now(),
                nome,
                salario
            });

            salvar();

            document.getElementById("nomePessoa").value = "";
            document.getElementById("salarioPessoa").value = "";

            renderizar();
        }

        function adicionarConta() {

            const nome = document.getElementById("nomeConta").value;
            const valor = Number(document.getElementById("valorConta").value);
            const tipo = document.getElementById("tipoConta").value;
            const pessoaId = document.getElementById("pessoaConta").value;

            if (!nome || !valor) {
                alert("Preencha os campos.");
                return;
            }

            contas.push({
                id: Date.now(),
                nome,
                valor,
                tipo,
                pessoaId
            });

            salvar();

            document.getElementById("nomeConta").value = "";
            document.getElementById("valorConta").value = "";

            renderizar();
        }

        function removerPessoa(id) {

            pessoas = pessoas.filter(x => x.id !== id);

            contas = contas.filter(x => Number(x.pessoaId) !== id);

            salvar();

            renderizar();
        }

        function removerConta(id) {

            contas = contas.filter(x => x.id !== id);

            salvar();

            renderizar();
        }

        function renderizarSelectPessoas() {

            const select = document.getElementById("pessoaConta");

            select.innerHTML = "";

            pessoas.forEach(pessoa => {

                select.innerHTML += `
                    <option value="${pessoa.id}">
                        ${pessoa.nome}
                    </option>
                `;
            });
        }

        function renderizarResumo() {

            const compartilhadas = contas.filter(x => x.tipo === "compartilhada");

            const totalCompartilhado = compartilhadas.reduce((acc, item) => acc + item.valor, 0);

            const totalPessoas = pessoas.length;

            const dividido = totalPessoas > 0
                ? totalCompartilhado / totalPessoas
                : 0;

            document.getElementById("totalCompartilhado").innerText =
                formatar(totalCompartilhado);

            document.getElementById("totalPessoas").innerText =
                totalPessoas;

            document.getElementById("valorDividido").innerText =
                formatar(dividido);
        }

        function renderizarPessoas() {

            const container = document.getElementById("listaPessoas");

            container.innerHTML = "";

            const compartilhadas = contas.filter(x => x.tipo === "compartilhada");

            const totalCompartilhado = compartilhadas.reduce((acc, item) => acc + item.valor, 0);

            const dividido = pessoas.length > 0
                ? totalCompartilhado / pessoas.length
                : 0;

            pessoas.forEach(pessoa => {

                const contasIndividuais = contas.filter(x =>
                    x.tipo === "individual" &&
                    Number(x.pessoaId) === pessoa.id
                );

                const totalIndividual =
                    contasIndividuais.reduce((acc, item) => acc + item.valor, 0);

                const sobra =
                    pessoa.salario -
                    dividido -
                    totalIndividual;

                const gastoDia = sobra / 30;

                container.innerHTML += `
                    <div class="glass rounded-3xl p-6 border border-slate-700 card-hover">

                        <div class="flex justify-between items-start">

                            <div>
                                <h3 class="text-2xl font-black">
                                    ${pessoa.nome}
                                </h3>

                                <p class="text-slate-400 mt-1">
                                    Salário: ${formatar(pessoa.salario)}
                                </p>
                            </div>

                            <button
                                onclick="removerPessoa(${pessoa.id})"
                                class="bg-red-500 hover:bg-red-400 px-3 py-2 rounded-xl font-bold"
                            >
                                X
                            </button>

                        </div>

                        <div class="mt-6 space-y-3">

                            <div class="flex justify-between">
                                <span class="text-slate-400">
                                    Parte Compartilhada
                                </span>

                                <span>
                                    ${formatar(dividido)}
                                </span>
                            </div>

                            <div class="flex justify-between">
                                <span class="text-slate-400">
                                    Contas Individuais
                                </span>

                                <span>
                                    ${formatar(totalIndividual)}
                                </span>
                            </div>

                            <div class="flex justify-between">
                                <span class="text-slate-400">
                                    Sobra Mensal
                                </span>

                                <span class="${sobra < 0 ? 'text-red-400' : 'text-emerald-400'} font-bold">
                                    ${formatar(sobra)}
                                </span>
                            </div>

                            <div class="flex justify-between">
                                <span class="text-slate-400">
                                    Pode gastar por dia
                                </span>

                                <span class="text-cyan-400 font-black">
                                    ${formatar(gastoDia)}
                                </span>
                            </div>

                        </div>

                        <div class="mt-6">

                            <h4 class="font-bold mb-3">
                                Contas Individuais
                            </h4>

                            ${
                                contasIndividuais.length === 0
                                ? `<p class="text-slate-500">
                                    Essa pessoa ainda não tem conta individual 😅
                                   </p>`
                                :
                                contasIndividuais.map(conta => `
                                    <div class="flex justify-between items-center bg-slate-900 rounded-xl p-3 mb-2">

                                        <div>
                                            <p class="font-semibold">
                                                ${conta.nome}
                                            </p>

                                            <p class="text-sm text-slate-400">
                                                ${formatar(conta.valor)}
                                            </p>
                                        </div>

                                        <button
                                            onclick="removerConta(${conta.id})"
                                            class="bg-red-500 hover:bg-red-400 px-2 py-1 rounded-lg text-sm"
                                        >
                                            remover
                                        </button>

                                    </div>
                                `).join("")
                            }

                        </div>

                    </div>
                `;
            });
        }

        function renderizar() {

            renderizarSelectPessoas();
            renderizarResumo();
            renderizarPessoas();
        }

        renderizar();

    </script>

</body>
</html>
