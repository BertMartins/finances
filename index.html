<!-- index.html -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Finanças Familiar
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="bg-slate-950 text-white">

    <div class="flex min-h-screen">

        <!-- SIDEBAR -->
        <aside class="w-72 bg-slate-900 border-r border-slate-800 p-5">

            <div class="mb-10">

                <h1 class="text-3xl font-black">
                    💰 Finanças
                </h1>

                <p class="text-slate-400 text-sm mt-1">
                    Controle familiar
                </p>

            </div>

            <nav class="space-y-2">

                <button onclick="abrirPagina('dashboard')"
                        class="menu-btn">

                    📊 Dashboard

                </button>

                <button onclick="abrirPagina('pessoas')"
                        class="menu-btn">

                    👨‍👩‍👧 Pessoas

                </button>

                <button onclick="abrirPagina('contas')"
                        class="menu-btn">

                    💸 Contas

                </button>

                <button onclick="abrirPagina('relatorios')"
                        class="menu-btn">

                    📈 Relatórios

                </button>

                <button onclick="abrirPagina('assistente')"
                        class="menu-btn">

                    🤖 Assistente IA

                </button>

            </nav>

        </aside>

        <!-- CONTENT -->
        <main class="flex-1 overflow-auto">

            <!-- HEADER -->
            <header class="h-20 border-b border-slate-800 flex items-center px-8">

                <h2 id="tituloPagina"
                    class="text-2xl font-black">

                    Dashboard

                </h2>

            </header>

            <!-- APP -->
            <section id="app"
                     class="p-8">

            </section>

        </main>

    </div>

    <!-- SCRIPTS -->
    <script src="js/storage.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/pessoas.js"></script>

    <script src="js/contas.js"></script>

    <script src="js/dashboard.js"></script>

    <script src="js/assistente.js"></script>

    <script src="js/tabs.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
